<style>
:root {
  --bg: #F8F6F2; --ink: #1C1914; --gold: #C88A50; --teal: #A06830;
  --pounamu: #C88A50; --amber: #C88A50; --clay: #B85C4F; --mist: #F1EDE8;
  --gray: #9A8C74; --gray-light: #B8AD9A; --white: #FFFFFF;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--ink); font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased; }
h1,h2,h3 { font-family:'Trebuchet MS',sans-serif; }

/* Progress Bar */
#progressBar { position:fixed; top:0; left:0; right:0; height:5px; background:var(--mist); z-index:1000; display:none; }
#progressFill { height:100%; background:var(--gold); transition:width 0.5s cubic-bezier(0.4,0,0.2,1); width:0%; }
#progressPct { position:absolute; right:12px; top:10px; font-size:11px; font-weight:600; color:var(--gray); letter-spacing:0.03em; }

/* Layout & Transitions */
#screenWrap { position:relative; overflow:hidden; }
.screen { min-height:100vh; padding:60px 24px 80px; }
.screen-inner { max-width:700px; margin:0 auto; }
#app.slide-in-right { animation: slideInRight 0.35s cubic-bezier(0.4,0,0.2,1) forwards; }
#app.slide-in-left { animation: slideInLeft 0.35s cubic-bezier(0.4,0,0.2,1) forwards; }
#app.slide-out-left { animation: slideOutLeft 0.35s cubic-bezier(0.4,0,0.2,1) forwards; }
#app.slide-out-right { animation: slideOutRight 0.35s cubic-bezier(0.4,0,0.2,1) forwards; }
@keyframes slideInRight { from { transform:translateX(60px); opacity:0; } to { transform:translateX(0); opacity:1; } }
@keyframes slideOutLeft { from { transform:translateX(0); opacity:1; } to { transform:translateX(-60px); opacity:0; } }
@keyframes slideInLeft { from { transform:translateX(-60px); opacity:0; } to { transform:translateX(0); opacity:1; } }
@keyframes slideOutRight { from { transform:translateX(0); opacity:1; } to { transform:translateX(60px); opacity:0; } }

/* Logo */
.logo { display:inline-flex; align-items:center; margin-bottom:32px; }
.logo-mark { background:var(--ink); color:var(--gold); font-size:10px; font-weight:700; padding:5px 7px; border-radius:5px; letter-spacing:0.08em; margin-right:4px; }
.logo-r { font-family:'Trebuchet MS',sans-serif; font-size:18px; font-weight:700; color:var(--gold); }
.logo-name { font-family:'Trebuchet MS',sans-serif; font-size:18px; font-weight:600; color:var(--ink); }

/* Typography */
.screen-title { font-size:clamp(24px,4vw,36px); font-weight:700; color:var(--ink); margin-bottom:12px; letter-spacing:-0.02em; }
.screen-sub { font-size:15px; color:var(--gray); line-height:1.7; margin-bottom:32px; }
.q-number { font-size:12px; font-weight:600; color:var(--gray-light); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; }
.q-text { font-size:18px; font-weight:600; color:var(--ink); line-height:1.5; margin-bottom:28px; }

/* Options */
.option-btn { display:block; width:100%; text-align:left; background:var(--white); border:1.5px solid var(--mist); border-radius:8px; padding:16px 20px; margin-bottom:10px; font-family:'DM Sans',sans-serif; font-size:14px; line-height:1.5; color:var(--ink); cursor:pointer; transition:all 0.2s; }
.option-btn:hover { border-color:rgba(200,138,80,0.5); background:rgba(200,138,80,0.03); }
.option-btn.selected { border-color:var(--gold); background:rgba(200,138,80,0.08); font-weight:500; }

/* Likert */
.likert-row { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.likert-btn { flex:1; min-width:100px; text-align:center; background:var(--white); border:1.5px solid var(--mist); border-radius:8px; padding:14px 8px; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--ink); cursor:pointer; transition:all 0.2s; }
.likert-btn:hover { border-color:rgba(200,138,80,0.5); }

/* Checkboxes */

.chip:hover { border-color:rgba(200,138,80,0.5); }
.chip.selected { border-color:var(--gold); background:rgba(200,138,80,0.08); font-weight:500; }

/* Buttons */
.btn-primary { display:inline-block; background:var(--gold); color:var(--white); border:none; border-radius:8px; padding:14px 36px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.2s; }

/* Text inputs */
.form-group { margin-bottom:20px; }

.form-input { width:100%; padding:12px 16px; border:1.5px solid var(--mist); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:15px; color:var(--ink); background:var(--white); transition:border-color 0.2s; }
.form-input:focus { outline:none; border-color:var(--gold); }

.form-error { font-size:12px; color:var(--clay); margin-top:4px; display:none; }
.form-input.invalid { border-color:var(--clay); }

/* Horizontal bar chart (results) */

.dim-bar-label { font-size:13px; font-weight:600; color:var(--ink); margin-bottom:6px; }
.dim-bar-track { height:28px; background:var(--mist); border-radius:6px; overflow:hidden; position:relative; }
.dim-bar-fill { height:100%; border-radius:6px; transition:width 1s cubic-bezier(0.4,0,0.2,1); display:flex; align-items:center; justify-content:flex-end; padding-right:10px; min-width:40px; }
.dim-bar-fill span { font-size:12px; font-weight:700; color:#fff; }
.dim-bar-tier { font-size:11px; font-weight:600; color:var(--gray); margin-top:3px; }

/* Section intro (IT track) */
.section-intro { text-align:center; padding:40px 0; }

.section-intro h2 { font-size:24px; margin-bottom:16px; }
.section-intro p { font-size:15px; color:var(--gray); line-height:1.7; max-width:560px; margin:0 auto; }

/* Section feedback (IT track) */
.section-feedback { padding:32px; background:rgba(200,138,80,0.04); border-radius:12px; border:1px solid var(--mist); margin:20px 0; }
.section-feedback .feedback-label { font-size:12px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; }
.section-feedback .feedback-level { font-size:18px; font-weight:700; color:var(--ink); margin-bottom:12px; }
.section-feedback p { font-size:14px; color:var(--gray); line-height:1.7; }

/* Results page */
.results-header { background:var(--ink); padding:48px 24px; text-align:center; }
.results-header .logo-mark { background:var(--bg); color:var(--gold); }
.results-header .logo-name { color:var(--bg); }
.results-header h1 { color:var(--bg); font-size:clamp(24px,3.5vw,36px); margin:24px 0 8px; }
.results-header .respondent { font-size:15px; color:var(--gray-light); }
.results-body { max-width:800px; margin:0 auto; padding:0 24px 80px; }
.tier-display { text-align:center; padding:0 0 40px; border-bottom:1px solid var(--mist); }
.tier-label { display:inline-block; padding:8px 24px; border-radius:6px; font-family:'Trebuchet MS',sans-serif; font-size:14px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; margin-bottom:8px; }
.tier-score { font-size:48px; font-weight:700; font-family:'Trebuchet MS',sans-serif; margin-bottom:4px; }
.tier-interp { font-size:15px; color:var(--gray); line-height:1.7; max-width:640px; margin:24px auto 0; text-align:left; }
.phase-badge { display:inline-block; padding:6px 16px; border-radius:6px; font-family:'Trebuchet MS',sans-serif; font-size:13px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; background:rgba(200,138,80,0.12); color:var(--gold); margin-bottom:12px; }
.phase-desc { font-size:14px; color:var(--gray); line-height:1.6; margin-bottom:16px; }
.skip-diagnosis { padding:32px; background:rgba(200,138,80,0.04); border-radius:12px; border:1px solid var(--mist); margin:32px 0; }
.skip-diagnosis h3 { font-size:16px; font-weight:700; margin-bottom:12px; color:var(--ink); }
.skip-diagnosis p { font-size:14px; color:var(--gray); line-height:1.7; }
.dim-section { padding:32px 0; border-bottom:1px solid var(--mist); }
.dim-section h3 { font-size:16px; font-weight:700; margin-bottom:6px; }
.dim-score-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.dim-score-pct { font-size:24px; font-weight:700; font-family:'Trebuchet MS',sans-serif; }
.dim-tier-badge { font-size:11px; font-weight:700; padding:4px 12px; border-radius:4px; text-transform:uppercase; letter-spacing:0.06em; }
.dim-interp { font-size:14px; color:var(--gray); line-height:1.7; }
.callout-box { background:rgba(200,138,80,0.06); border-left:3px solid var(--gold); padding:20px 24px; border-radius:0 8px 8px 0; margin:32px 0; }
.callout-box h3 { font-size:15px; margin-bottom:8px; }
.callout-box p { font-size:14px; color:var(--gray); line-height:1.7; }
.cta-section { text-align:center; padding:48px 0; }
.cta-section .cta-personal { font-size:15px; color:var(--gray); margin-bottom:16px; font-style:italic; }
.cta-section .cta-framing { font-size:17px; font-weight:600; color:var(--ink); margin-bottom:16px; }
.cta-section .cta-body { font-size:14px; color:var(--gray); line-height:1.7; max-width:600px; margin:0 auto 28px; text-align:left; }
.cross-track { text-align:center; padding:32px 0; border-top:1px solid var(--mist); }
.cross-track p { font-size:14px; color:var(--gray); line-height:1.6; margin-bottom:16px; max-width:520px; margin-left:auto; margin-right:auto; }
.action-row { display:flex; gap:12px; justify-content:center; padding:24px 0; }
.results-footer { text-align:center; padding:40px 24px; border-top:1px solid var(--mist); }
.results-footer p { font-size:11px; color:var(--gray-light); }

/* Responsive */
@media(max-width:768px) {
  .form-flex { flex-direction:column !important; }
}
@media(max-width:600px) {
  .screen { padding:40px 16px 60px; }
  .likert-row { flex-direction:column; }
  .likert-btn { min-width:auto; padding:16px 12px; }
  .chip { padding:12px 16px; }
  .btn-row { flex-direction:column-reverse; gap:16px; align-items:stretch; text-align:center; }
  .action-row { flex-direction:column; align-items:center; }
  .results-header h1 { font-size:22px; }
  .tier-score { font-size:36px; }
}

/* Print */
@media print {
  #progressBar,.btn-primary,.btn-secondary,.back-link,.skip-link,.action-row,.cross-track,.btn-row,.cta-section { display:none!important; }

  .results-header { -webkit-print-color-adjust:exact; print-color-adjust:exact; }

  .results-body { padding:0 20px 40px; }
  .results-footer { page-break-inside:avoid; margin-top:0; padding-top:12px; }
  .action-row { display:none!important; height:0; overflow:hidden; margin:0; padding:0; }

}

/* Contact overlay */
.contact-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 500; display: flex; align-items: flex-end; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.35s ease; }

.contact-modal .contact-sub { font-size: 15px; color: #9A8C74; margin-bottom: 32px; line-height: 1.6; }

@media (max-width: 600px) { .contact-row { grid-template-columns: 1fr; } .contact-modal { padding: 40px 24px 32px; } }
.contact-field { display: flex; flex-direction: column; }

<script>
// ============================================================
// STATE
// ============================================================
const state = {
  track: null,       // set to 'strategic' at assessment start (unified assessment)
  contact: { firstName:'', lastName:'', email:'', company:'', title:'' },
  profile: { industry:null, size:null, revenue:null, platforms:[], aiTools:[] },
  answers: {},
  tags: {},
  openText: { ot1:'' },
  urgency: [],
  cxSkipped: false,
  screenIndex: 0,
  screens: [],
  preScreens: []     // track pre-assessment screens for back navigation
};

// ============================================================
// DIMENSION NAMES (v2)
// ============================================================
const DIM_NAMES = {
  D1:'Strategic Vision & Leadership',
  D2:'Data Readiness',
  D3:'Technology Infrastructure',
  D4:'Governance & Security',
  D5:'Experience Layer',
  D6:'Workforce & Adoption'
};

// ============================================================
// UNIFIED ASSESSMENT QUESTIONS (18 questions, best of both tracks)
// ============================================================
const UNIFIED_QUESTIONS = [
  // D1 — Strategic Vision & Leadership
  { id:'q1', dim:'D1', type:'scenario', text:'Who in your organization is accountable for AI outcomes \u2014 not exploration, but measurable results?', options:[
    {text:'A dedicated leader or team owns it \u2014 with budget, authority, and a cross-functional mandate',score:4},
    {text:'Someone senior owns it, but it\u2019s siloed in one department \u2014 IT, operations, or innovation',score:3},
    {text:'Someone got asked to \u2018figure out AI\u2019 on top of their real job',score:2},
    {text:'There\u2019s interest at the top, but no one person or team is accountable for results',score:1},
    {text:'Nobody \u2014 AI is happening around us, not because of us',score:0}
  ]},
  { id:'q2', dim:'D1', type:'likert', text:'The people setting AI strategy and the people building AI infrastructure are working from the same plan \u2014 not operating in parallel.' },
  { id:'q3', dim:'D1', type:'scenario', text:'Can you point to a specific business outcome \u2014 revenue, cost savings, speed, customer impact \u2014 that AI has produced for your organization?', options:[
    {text:'Yes \u2014 we can tie AI directly to measurable outcomes',score:4},
    {text:'We believe it\u2019s helping, but we can\u2019t prove it with numbers yet',score:2},
    {text:'We\u2019re still in early stages \u2014 no outcomes to measure yet',score:1},
    {text:'We haven\u2019t deployed AI in any meaningful way',score:0}
  ]},

  // D2 — Data Readiness
  { id:'q4', dim:'D2', type:'scenario', text:'If you needed a cross-functional view \u2014 sales, operations, finance, and customer data in one place \u2014 what would that take?', options:[
    {text:'Same day \u2014 our data is integrated and teams can self-serve',score:4},
    {text:'A few days \u2014 we\u2019d need to coordinate across teams and clean things up',score:3},
    {text:'Weeks \u2014 it means chasing people, exporting from multiple systems, and reconciling formats',score:1},
    {text:'Nobody has a unified view \u2014 I\u2019m not sure we could do it with what we have today',score:0}
  ]},
  { id:'q5', dim:'D2', type:'likert', text:'We know who owns our data \u2014 who\u2019s accountable for its quality, its accuracy, and who can access it \u2014 across every major system we run.' },
  { id:'q6', dim:'D2', type:'scenario', text:'If an AI tool needed to pull from your customer data, your financials, and your operations data today \u2014 how fast could you make that happen?', options:[
    {text:'Days \u2014 our data is governed, documented, and ready to connect',score:4},
    {text:'Weeks \u2014 we\u2019d need to build integrations and clean things up first',score:2},
    {text:'Months \u2014 our data lives in systems that don\u2019t talk to each other',score:1},
    {text:'We honestly don\u2019t know \u2014 nobody\u2019s tried',score:0}
  ]},

  // D3 — Technology Infrastructure
  { id:'q7', dim:'D3', type:'likert', text:'Our network infrastructure \u2014 bandwidth, latency, reliability across locations \u2014 is ready for what AI workloads, cloud platforms, and real-time data access demand.' },
  { id:'q8', dim:'D3', type:'scenario', text:'When a new AI workload needs compute, storage, or bandwidth \u2014 what happens?', options:[

// CONTINUUM PHASE ASSIGNMENT (v2)

function getContinuumPhase(scores) {
  const overall = getOverallScore();
  if (overall <= 30) return { phase:1, name:'Visibility', desc:'You don\u2019t yet know what\u2019s happening in your environment' };
  if (scores.D2 <= 40 || scores.D3 <= 40 || scores.D4 <= 40) return { phase:2, name:'Foundation', desc:'You can see the gaps but the layers aren\u2019t built yet' };
  const d5 = scores.D5 !== null ? scores.D5 : 100;
  if (d5 <= 40) return { phase:3, name:'Activation', desc:'Foundation is in place, deployment is underway' };
  if (overall >= 65) return { phase:4, name:'Compound', desc:'AI is producing returns and the intelligence is being captured' };
  return { phase:2, name:'Foundation', desc:'You can see the gaps but the layers aren\u2019t built yet' };
}

// ============================================================
// SCORING
// ============================================================
function getDimScore(dimId) {
  const qIds = UNIFIED_DIM_MAP[dimId];
  let sum = 0, count = 0;
  qIds.forEach(id => {
    const a = state.answers[id];
    if (a !== undefined && a !== null && a >= 0) { sum += a; count++; }
  });
  if (count === 0) return 0;
  return Math.round((sum / (count * 4)) * 100);
}

function getOverallScore() {
  const dims = ['D1','D2','D3','D4','D5','D6'];
  let total = 0, count = 0;
  dims.forEach(d => {
    if (d === 'D5' && state.cxSkipped) {
      // Score D5 on 2 questions only (q14 always scored; q15 skipped)
      const nonCxId = UNIFIED_DIM_MAP.D5[1]; // q14 (meeting intelligence, always shown)
      const a = state.answers[nonCxId];
      if (a !== undefined && a >= 0) { total += Math.round((a / 4) * 100); count++; }
      return;
    }
    total += getDimScore(d);
    count++;
  });
  return count > 0 ? Math.round(total / count) : 0;
}

function getDimScoreForResults(dimId) {
  if (dimId === 'D5' && state.cxSkipped) {
    // Only score on the one non-conditional, non-gate question
    const nonCxId = UNIFIED_DIM_MAP.D5[1]; // q14
    const a = state.answers[nonCxId];
    if (a !== undefined && a >= 0) return Math.round((a / 4) * 100);
    return 0;
  }
  return getDimScore(dimId);
}

function getTier(score) {
  if (score <= 25) return 'Foundational';
  if (score <= 50) return 'Developing';
  if (score <= 75) return 'Advancing';
  return 'Leading';
}

function getTierColor(tier) {
  return {Foundational:'#B85C4F',Developing:'#C88A50',Advancing:'#A06830',Leading:'#C88A50'}[tier] || '#C88A50';
}

function updateProgress() {
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  const current = state.screens[state.screenIndex];
  if (!current || current.type === 'results') {
    bar.style.display = 'none';
    return;
  }
  bar.style.display = 'block';
  const total = state.screens.filter(s => s.type !== 'results').length;
  const pct = Math.min(100, Math.round((state.screenIndex / total) * 100));
  fill.style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';
}

const app = document.getElementById('app');
let navDirection = 'forward';
let isTransitioning = false;

function showScreen(index, direction) {
  if (isTransitioning) return;
  const prevIndex = state.screenIndex;
  if (direction) navDirection = direction;
  else navDirection = index >= prevIndex ? 'forward' : 'back';

  state.screenIndex = index;
  updateProgress();

  if (index < 0) return;

  const screen = state.screens[index];
  if (!screen) return;

  // Skip CX conditional questions if CX was skipped
  if (screen.type === 'question' && screen.q.cxConditional && state.cxSkipped) {
    showScreen(index + (navDirection === 'forward' ? 1 : -1), navDirection);
    return;
  }

  // Animate transition
  const slideOut = navDirection === 'forward' ? 'slide-out-left' : 'slide-out-right';
  const slideIn = navDirection === 'forward' ? 'slide-in-right' : 'slide-in-left';

  if (prevIndex !== index && app.innerHTML.trim()) {
    isTransitioning = true;
    app.classList.add(slideOut);
    setTimeout(() => {
      app.classList.remove(slideOut);
      renderScreen(screen);
      app.classList.add(slideIn);
      window.scrollTo(0, 0);
      setTimeout(() => { app.classList.remove(slideIn); isTransitioning = false; }, 350);
    }, 200);
  } else {
    renderScreen(screen);
    window.scrollTo(0, 0);
  }
}

function renderScreen(screen) {
  switch(screen.type) {
    case 'profile-radio': renderProfileRadio(screen); break;
    case 'profile-platforms': renderProfilePlatforms(); break;
    case 'profile-checkbox': renderProfileCheckbox(screen); break;
    case 'question': renderQuestion(screen); break;
    case 'tag': renderTag(screen); break;
    case 'tagMulti': renderTagMulti(screen); break;
    case 'open-text': renderOpenText(screen); break;
    case 'results': renderResults(); break;
  }
}

function goNext() {
  showScreen(state.screenIndex + 1, 'forward');
}

function goBack() {
  if (state.screenIndex > 0) {
    var prev = state.screenIndex - 1;
    while (prev >= 0) {
      var s = state.screens[prev];
      if (s.type === 'question' && s.q.cxConditional && state.cxSkipped) { prev--; continue; }
      break;
    }
    showScreen(Math.max(0, prev), 'back');
  } else {
    // Go back to contact gate
    renderContactGate();
  }
}

    '<div class="form-error" id="emailError">Please use your work email address.</div>' +
    '</div>' +
    '<div class="form-flex" style="display:flex;gap:16px;">' +
    '<div class="form-group" style="flex:1;">' +
    '<label>Company Name</label>' +
    '<input class="form-input" type="text" id="contactCompany" value="' + state.contact.company + '" placeholder="Your company" oninput="state.contact.company=this.value;validateContact()">' +
    '</div>' +
    '<div class="form-group" style="flex:1;">' +
    '<label>Title</label>' +
    '<input class="form-input" type="text" id="contactTitle" value="' + state.contact.title + '" placeholder="Your title" oninput="state.contact.title=this.value;validateContact()">' +
    '</div></div>' +
    '<div class="btn-row">' +
    '<a class="back-link" onclick="showWelcome()">Back</a>' +
    '<button class="btn-primary" id="contactNext" disabled onclick="startAssessment()">Begin Diagnostic</button>' +
    '</div></div></div>';
  validateContact();
}

function validateContact() {
  var btn = document.getElementById('contactNext');
  var errEl = document.getElementById('emailError');
  var emailInput = document.getElementById('contactEmail');
  if (!btn) return;

  var email = state.contact.email.trim().toLowerCase();
  var domain = email.split('@')[1] || '';
  var isPersonal = PERSONAL_DOMAINS.includes(domain);
  var hasValidFormat = email.includes('@') && domain.includes('.');

  if (errEl) {
    if (email && hasValidFormat && isPersonal) {
      errEl.style.display = 'block';
      if (emailInput) emailInput.classList.add('invalid');
    } else {
      errEl.style.display = 'none';
      if (emailInput) emailInput.classList.remove('invalid');
    }
  }

  var valid = state.contact.firstName.trim() && state.contact.lastName.trim() && email && hasValidFormat && !isPersonal && state.contact.company.trim() && state.contact.title.trim();
  btn.disabled = !valid;
}

function startAssessment() {
  state.track = 'strategic'; // unified assessment, set for results engine compatibility
  buildScreens();
  showScreen(0);
}

// ============================================================
// INIT
// ============================================================
showWelcome();
</script>

<div class="contact-overlay" id="contactOverlay" onclick="if(event.target===this)this.classList.remove('open')">
  <div class="contact-modal">
    <button class="contact-close" onclick="document.getElementById('contactOverlay').classList.remove('open')">&times;</button>
    <h2>Let's start with clarity.</h2>
    <p class="contact-sub">A conversation about where you are and what's possible.</p>
    <form class="contact-form" id="contactFormOverlay" onsubmit="handleOverlaySubmit(event)">
      <div class="contact-row">
        <div class="contact-field">
          <label for="cf-name">Name</label>
          <input type="text" id="cf-name" name="name" placeholder="Your name" required>
        </div>
        <div class="contact-field">
          <label for="cf-company">Company</label>
          <input type="text" id="cf-company" name="company" placeholder="Company name">
        </div>
      </div>
      <div class="contact-field">
        <label for="cf-email">Work Email</label>
        <input type="email" id="cf-email" name="email" placeholder="you@company.com" required>
      </div>
      <div class="contact-field">
        <label for="cf-interest">What's on your mind?</label>
        <textarea id="cf-interest" name="interest" rows="3" placeholder="Anything you'd like us to know before we talk..."></textarea>
      </div>
      <button type="submit" class="contact-submit">Let's Connect</button>
      <p class="contact-note">We'll reach out within one business day.</p>
    </form>
    <div class="contact-success" id="contactSuccessOverlay">
      <h3>We'll be in touch.</h3>
      <p>Thanks for reaching out. Someone from our team will connect with you within one business day.</p>
    </div>
  </div>
</div>

<script>
function handleOverlaySubmit(e) {
  e.preventDefault();
  var form = document.getElementById('contactFormOverlay');
  var success = document.getElementById('contactSuccessOverlay');
  var data = { name: form.querySelector('#cf-name').value, email: form.querySelector('#cf-email').value, company: form.querySelector('#cf-company').value, interest: form.querySelector('#cf-interest').value, source: 'assessment-results' };
  console.log('Lead captured:', data);
  form.style.display = 'none';
  success.style.display = 'block';
  setTimeout(function() { document.getElementById('contactOverlay').classList.remove('open'); }, 3000);
}
</script>

</body>
