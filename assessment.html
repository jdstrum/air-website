<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Readiness Assessment | AI Resulting</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FDFBF9; --ink: #2F2F2F; --gold: #AC9379; --teal: #5B8A72;
  --pounamu: #7A8B6F; --amber: #C4956A; --clay: #B85C4F; --mist: #E8E2DC;
  --gray: #8A8279; --gray-light: #B5AFA8; --white: #FFFFFF;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--ink); font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased; }
h1,h2,h3 { font-family:'Trebuchet MS',sans-serif; }

/* Progress Bar */
#progressBar { position:fixed; top:0; left:0; right:0; height:5px; background:var(--mist); z-index:1000; display:none; }
#progressFill { height:100%; background:var(--gold); transition:width 0.5s cubic-bezier(0.4,0,0.2,1); width:0%; }

/* Layout & Transitions */
#screenWrap { position:relative; overflow:hidden; }
.screen { min-height:100vh; padding:60px 24px 80px; }
.screen-inner { max-width:700px; margin:0 auto; }
#app.slide-in-right { animation: slideInRight 0.35s cubic-bezier(0.4,0,0.2,1) forwards; }
#app.slide-in-left { animation: slideInLeft 0.35s cubic-bezier(0.4,0,0.2,1) forwards; }
#app.slide-out-left { animation: slideOutLeft 0.35s cubic-bezier(0.4,0,0.2,1) forwards; }
#app.slide-out-right { animation: slideOutRight 0.35s cubic-bezier(0.4,0,0.2,1) forwards; }
@keyframes slideInRight { from { transform:translateX(60px); opacity:0; } to { transform:translateX(0); opacity:1; } }
@keyframes slideOutLeft { from { transform:translateX(0); opacity:1; } to { transform:translateX(-60px); opacity:0; } }
@keyframes slideInLeft { from { transform:translateX(-60px); opacity:0; } to { transform:translateX(0); opacity:1; } }
@keyframes slideOutRight { from { transform:translateX(0); opacity:1; } to { transform:translateX(60px); opacity:0; } }

/* Logo */
.logo { display:inline-flex; align-items:center; margin-bottom:32px; }
.logo-mark { background:var(--ink); color:var(--gold); font-size:10px; font-weight:700; padding:5px 7px; border-radius:5px; letter-spacing:0.08em; margin-right:4px; }
.logo-r { font-family:'Trebuchet MS',sans-serif; font-size:18px; font-weight:700; color:var(--gold); }
.logo-name { font-family:'Trebuchet MS',sans-serif; font-size:18px; font-weight:600; color:var(--ink); }

/* Typography */
.screen-title { font-size:clamp(24px,4vw,36px); font-weight:700; color:var(--ink); margin-bottom:12px; letter-spacing:-0.02em; }
.screen-sub { font-size:15px; color:var(--gray); line-height:1.7; margin-bottom:32px; }
.q-number { font-size:12px; font-weight:600; color:var(--gray-light); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; }
.q-text { font-size:18px; font-weight:600; color:var(--ink); line-height:1.5; margin-bottom:28px; }
.q-statement { font-size:18px; font-weight:600; color:var(--ink); line-height:1.5; margin-bottom:28px; }

/* Options */
.option-btn { display:block; width:100%; text-align:left; background:var(--white); border:1.5px solid var(--mist); border-radius:8px; padding:16px 20px; margin-bottom:10px; font-family:'DM Sans',sans-serif; font-size:14px; line-height:1.5; color:var(--ink); cursor:pointer; transition:all 0.2s; }
.option-btn:hover { border-color:rgba(172,147,121,0.5); background:rgba(172,147,121,0.03); }
.option-btn.selected { border-color:var(--gold); background:rgba(172,147,121,0.08); font-weight:500; }

/* Likert */
.likert-row { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.likert-btn { flex:1; min-width:100px; text-align:center; background:var(--white); border:1.5px solid var(--mist); border-radius:8px; padding:14px 8px; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--ink); cursor:pointer; transition:all 0.2s; }
.likert-btn:hover { border-color:rgba(172,147,121,0.5); }
.likert-btn.selected { border-color:var(--gold); background:rgba(172,147,121,0.08); font-weight:600; }

/* Checkboxes (for platforms) */
.checkbox-group { margin-bottom:24px; }
.checkbox-group h4 { font-size:13px; font-weight:600; color:var(--gray); margin-bottom:10px; text-transform:uppercase; letter-spacing:0.05em; }
.checkbox-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px; }
.chip { display:inline-block; padding:8px 16px; border:1.5px solid var(--mist); border-radius:20px; font-size:13px; color:var(--ink); cursor:pointer; transition:all 0.2s; user-select:none; }
.chip:hover { border-color:rgba(172,147,121,0.5); }
.chip.selected { border-color:var(--gold); background:rgba(172,147,121,0.08); font-weight:500; }

/* Buttons */
.btn-primary { display:inline-block; background:var(--gold); color:var(--white); border:none; border-radius:8px; padding:14px 36px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.btn-primary:hover { background:#967F67; }
.btn-primary:disabled { opacity:0.4; cursor:not-allowed; }
.btn-secondary { display:inline-block; background:transparent; color:var(--gold); border:1.5px solid var(--gold); border-radius:8px; padding:12px 28px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.btn-secondary:hover { background:rgba(172,147,121,0.06); }
.btn-row { display:flex; justify-content:space-between; align-items:center; margin-top:32px; }
.back-link { font-size:14px; color:var(--gray); cursor:pointer; text-decoration:none; transition:color 0.2s; }
.back-link:hover { color:var(--ink); }
.skip-link { font-size:13px; color:var(--gray-light); cursor:pointer; text-decoration:underline; margin-top:12px; display:inline-block; }

/* Text inputs */
.form-group { margin-bottom:20px; }
.form-group label { display:block; font-size:13px; font-weight:600; color:var(--gray); margin-bottom:6px; }
.form-input { width:100%; padding:12px 16px; border:1.5px solid var(--mist); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:15px; color:var(--ink); background:var(--white); transition:border-color 0.2s; }
.form-input:focus { outline:none; border-color:var(--gold); }
textarea.form-input { min-height:100px; resize:vertical; }
.char-count { font-size:11px; color:var(--gray-light); text-align:right; margin-top:4px; }
.form-error { font-size:12px; color:var(--clay); margin-top:4px; display:none; }
.form-input.invalid { border-color:var(--clay); }

/* Horizontal bar chart (results) */
.dim-bar-wrap { margin-bottom:20px; }
.dim-bar-label { font-size:13px; font-weight:600; color:var(--ink); margin-bottom:6px; }
.dim-bar-track { height:28px; background:var(--mist); border-radius:6px; overflow:hidden; position:relative; }
.dim-bar-fill { height:100%; border-radius:6px; transition:width 1s cubic-bezier(0.4,0,0.2,1); display:flex; align-items:center; justify-content:flex-end; padding-right:10px; min-width:40px; }
.dim-bar-fill span { font-size:12px; font-weight:700; color:#fff; }
.dim-bar-tier { font-size:11px; font-weight:600; color:var(--gray); margin-top:3px; }

/* Section intro (IT track) */
.section-intro { text-align:center; padding:40px 0; }
.section-intro .dim-label { font-size:11px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:0.12em; margin-bottom:12px; }
.section-intro h2 { font-size:24px; margin-bottom:16px; }
.section-intro p { font-size:15px; color:var(--gray); line-height:1.7; max-width:560px; margin:0 auto; }

/* Section feedback (IT track) */
.section-feedback { padding:32px; background:rgba(172,147,121,0.04); border-radius:12px; border:1px solid var(--mist); margin:20px 0; }
.section-feedback .feedback-label { font-size:12px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; }
.section-feedback .feedback-level { font-size:18px; font-weight:700; color:var(--ink); margin-bottom:12px; }
.section-feedback p { font-size:14px; color:var(--gray); line-height:1.7; }

/* Results page */
.results-header { background:var(--ink); padding:48px 24px; text-align:center; }
.results-header .logo-mark { background:var(--bg); color:var(--gold); }
.results-header .logo-name { color:var(--bg); }
.results-header h1 { color:var(--bg); font-size:clamp(24px,3.5vw,36px); margin:24px 0 8px; }
.results-header .respondent { font-size:15px; color:var(--gray-light); }
.results-body { max-width:800px; margin:0 auto; padding:0 24px 80px; }
.tier-display { text-align:center; padding:0 0 40px; border-bottom:1px solid var(--mist); }
.tier-label { display:inline-block; padding:8px 24px; border-radius:6px; font-family:'Trebuchet MS',sans-serif; font-size:14px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; margin-bottom:8px; }
.tier-score { font-size:48px; font-weight:700; font-family:'Trebuchet MS',sans-serif; margin-bottom:4px; }
.tier-interp { font-size:15px; color:var(--gray); line-height:1.7; max-width:640px; margin:24px auto 0; text-align:left; }
.dim-section { padding:32px 0; border-bottom:1px solid var(--mist); }
.dim-section h3 { font-size:16px; font-weight:700; margin-bottom:6px; }
.dim-score-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.dim-score-pct { font-size:24px; font-weight:700; font-family:'Trebuchet MS',sans-serif; }
.dim-tier-badge { font-size:11px; font-weight:700; padding:4px 12px; border-radius:4px; text-transform:uppercase; letter-spacing:0.06em; }
.dim-interp { font-size:14px; color:var(--gray); line-height:1.7; }
.callout-box { background:rgba(172,147,121,0.06); border-left:3px solid var(--gold); padding:20px 24px; border-radius:0 8px 8px 0; margin:32px 0; }
.callout-box h3 { font-size:15px; margin-bottom:8px; }
.callout-box p { font-size:14px; color:var(--gray); line-height:1.7; }
.cta-section { text-align:center; padding:48px 0; }
.cta-section .cta-framing { font-size:17px; font-weight:600; color:var(--ink); margin-bottom:16px; }
.cta-section .cta-body { font-size:14px; color:var(--gray); line-height:1.7; max-width:600px; margin:0 auto 28px; text-align:left; }
.cross-track { text-align:center; padding:32px 0; border-top:1px solid var(--mist); }
.cross-track p { font-size:14px; color:var(--gray); line-height:1.6; margin-bottom:16px; max-width:520px; margin-left:auto; margin-right:auto; }
.action-row { display:flex; gap:12px; justify-content:center; padding:24px 0; }
.results-footer { text-align:center; padding:40px 24px; border-top:1px solid var(--mist); }
.results-footer p { font-size:11px; color:var(--gray-light); }

/* Responsive */
@media(max-width:600px) {
  .screen { padding:40px 16px 60px; }
  .likert-row { flex-direction:column; }
  .likert-btn { min-width:auto; }
  .btn-row { flex-direction:column-reverse; gap:16px; align-items:stretch; text-align:center; }
  .action-row { flex-direction:column; align-items:center; }
}

/* Print */
@media print {
  #progressBar,.btn-primary,.btn-secondary,.back-link,.skip-link,.action-row,.cross-track,.btn-row,.cta-section { display:none!important; }
  .screen { padding:20px; }
  .results-header { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .dim-bar-fill { -webkit-print-color-adjust:exact; print-color-adjust:exact; transition:none!important; }
  .dim-bar-track { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .tier-label,.dim-tier-badge { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .results-body { padding:0 20px 40px; }
}
</style>
</head>
<body>

<div id="progressBar"><div id="progressFill"></div></div>

<!-- All screens rendered dynamically into this container -->
<div id="screenWrap"><div id="app"></div></div>

<script>
// ============================================================
// STATE
// ============================================================
const state = {
  pathway: null,
  track: null,
  role: null,
  contact: { name:'', email:'', company:'' },
  profile: { industry:null, size:null, revenue:null, platforms:[], aiTools:[], urgency:[] },
  answers: {},
  tags: {},
  openText: { ot1:'', ot2:'' },
  cxSkipped: false,
  iotSkipped: false,
  screenIndex: 0,
  screens: []
};

// ============================================================
// DIMENSION NAMES
// ============================================================
const DIM_NAMES = {
  D1:'Strategic Vision & Leadership', D2:'Data Readiness', D3:'Infrastructure & Network',
  D4:'Governance & Security', D5:'Customer Experience & AI', D6:'Workforce & Culture'
};

// ============================================================
// C-SUITE QUESTIONS
// ============================================================
const CS_QUESTIONS = [
  { id:'cs1', dim:'D4', type:'scenario', text:'Your employees are using AI tools right now \u2014 ChatGPT, Copilot, Gemini, or others. How much visibility do you have into what\u2019s actually happening?', options:[
    {text:'Full visibility \u2014 we know who\u2019s using what, how, and with what data',score:4},
    {text:'Good visibility \u2014 we\u2019ve deployed approved tools and have usage data',score:3},
    {text:'Partial \u2014 we know some of it but couldn\u2019t give you the full picture',score:2},
    {text:'Minimal \u2014 I know it\u2019s happening but couldn\u2019t tell you the specifics',score:1},
    {text:'None \u2014 and I\u2019m not sure I\u2019d know where to look',score:0}
  ]},
  { id:'cs2', dim:'D2', type:'likert', text:'I am confident that the data my teams rely on for decisions is accurate, complete, and current.' },
  { id:'cs3', dim:'D1', type:'scenario', text:'Has your organization made commitments about AI \u2014 to your board, your customers, or your own leadership team \u2014 that you haven\u2019t yet delivered on?', options:[
    {text:'No \u2014 we\u2019ve delivered on what we\u2019ve committed to and have a clear roadmap ahead',score:4},
    {text:'Minor gaps \u2014 we\u2019re mostly on track but a few things have taken longer than expected',score:3},
    {text:'Yes \u2014 we\u2019ve made commitments that are stalled or significantly behind schedule',score:2},
    {text:'Yes \u2014 we\u2019ve talked about AI but haven\u2019t made meaningful progress',score:1},
    {text:'We haven\u2019t made specific commitments about AI yet',score:0}
  ]},
  { id:'cs4', dim:'D6', type:'scenario', text:'When your organization rolls out a new technology or AI-powered tool, what typically happens?', options:[
    {text:'Rapid adoption \u2014 people find applications beyond what we intended',score:4},
    {text:'Strong adoption within weeks, supported by training and leadership encouragement',score:3},
    {text:'Moderate \u2014 some teams embrace it, others ignore it for months',score:2},
    {text:'A few early adopters try it, but most people stick with what they know',score:1},
    {text:'It mostly sits unused',score:0}
  ]},
  { id:'cs5', dim:'D3', type:'likert', text:'Our core business systems are modern, well-integrated, and ready for the demands AI workloads will place on them.' },
  { id:'cs6', dim:'D5', type:'scenario', cxGate:true, text:'When a customer interacts with your company \u2014 whether by phone, email, chat, or in person \u2014 does that experience feel consistent regardless of which channel or person they reach?', options:[
    {text:'Yes \u2014 fully integrated experience with shared context across every touchpoint',score:4},
    {text:'Mostly \u2014 our main channels are connected but there are gaps',score:3},
    {text:'Inconsistent \u2014 it depends on which team or channel the customer hits',score:2},
    {text:'We know it\u2019s a problem but haven\u2019t been able to solve it yet',score:1},
    {text:'We don\u2019t have a structured approach to customer experience across channels',score:0},
    {text:'Not applicable \u2014 we don\u2019t operate customer-facing support operations',score:-1,skip:true}
  ]},
  { id:'cs7', dim:'D4', type:'scenario', text:'Every time someone at your company uses an AI tool, they\u2019re generating intelligence \u2014 prompts, workflows, problem-solving approaches, institutional knowledge. What\u2019s happening with that intelligence?', options:[
    {text:'We capture it on a governed platform and it flows back into the organization',score:4},
    {text:'We have guidelines for documenting AI-assisted work, with partial adoption',score:3},
    {text:'Some teams share AI outputs informally, but nothing is captured systematically',score:2},
    {text:'It stays with the individual \u2014 we\u2019re not capturing any of it',score:1},
    {text:'I hadn\u2019t thought about it that way until right now',score:0}
  ]},
  { id:'cs8', dim:'D1', type:'scenario', text:'If your board asked you today to quantify the return on your AI investments so far, could you?', options:[
    {text:'Yes \u2014 defined KPIs showing measurable business impact from AI initiatives',score:4},
    {text:'Partially \u2014 we can point to improvements but haven\u2019t formalized measurement',score:3},
    {text:'Not really \u2014 we\u2019ve spent money on AI tools but can\u2019t attribute specific returns',score:2},
    {text:'No \u2014 we can\u2019t separate AI impact from general technology spending',score:1},
    {text:'We haven\u2019t invested enough in AI yet to measure anything',score:0}
  ]},
  { id:'cs9', dim:'D3', type:'likert', text:'If our organization needed to significantly scale its digital operations in the next 90 days \u2014 more users, bigger workloads, new AI tools \u2014 our infrastructure could handle it.' },
  { id:'cs10', dim:'D6', type:'likert', text:'Our leadership team is actively driving AI adoption \u2014 not just endorsing it, but personally championing and modeling its use.' },
  { id:'cs11', dim:'D2', type:'scenario', text:'If you needed to answer a strategic question using data from across your organization \u2014 sales, operations, finance, customer \u2014 how long would it take to pull that together?', options:[
    {text:'Hours \u2014 our data is accessible and integrated across the business',score:4},
    {text:'A day or two \u2014 most of it is reachable but some assembly required',score:3},
    {text:'A week or more \u2014 it requires pulling from multiple systems and people',score:2},
    {text:'It would be a significant project \u2014 our data lives in silos',score:1},
    {text:'I\u2019m not sure we could do it at all with current systems',score:0}
  ]},
  { id:'cs12', dim:'D5', type:'scenario', cxConditional:true, text:'Are you using any AI or automation in how you interact with customers \u2014 chatbots, intelligent routing, agent assistance, automated responses, or predictive analytics?', options:[
    {text:'Yes \u2014 AI is embedded across multiple customer touchpoints with measurable impact',score:4},
    {text:'Yes \u2014 we\u2019re using AI in one or two areas of the customer experience',score:3},
    {text:'Basic automation only \u2014 IVR, simple chatbot, or auto-responses',score:2},
    {text:'No \u2014 all customer interactions are handled manually',score:1},
    {text:'We haven\u2019t explored AI for customer-facing operations',score:0}
  ]},
  { id:'cs13', dim:'D4', type:'scenario', text:'Does your organization have a written policy governing how employees can and cannot use AI tools?', options:[
    {text:'Yes \u2014 comprehensive framework covering usage, data handling, tool authorization, and compliance',score:4},
    {text:'Yes \u2014 documented acceptable use policy communicated to employees',score:3},
    {text:'Informally \u2014 guidelines exist but nothing documented or enforced',score:2},
    {text:'No \u2014 but we know we need one',score:1},
    {text:'No \u2014 and it hasn\u2019t been a priority',score:0}
  ]},
  { id:'cs14', dim:'D1', type:'scenario', text:'Who in your organization is accountable for AI outcomes \u2014 not AI exploration, but measurable results?', options:[
    {text:'A dedicated AI leader or team with cross-functional authority and reporting structure',score:4},
    {text:'A specific executive with defined goals and budget',score:3},
    {text:'IT handles it as part of their general responsibilities',score:2},
    {text:'Someone has been informally tasked with "figuring out AI"',score:1},
    {text:'Nobody \u2014 it hasn\u2019t been formally assigned',score:0}
  ]},
  { id:'cs15', dim:'D2', type:'likert', text:'I know what data our AI tools have access to inside the organization \u2014 and what data is leaving through AI tools our employees are using on their own.' },
  { id:'cs16', dim:'D3', type:'scenario', text:'If a critical business system went down tomorrow \u2014 your CRM, your ERP, your communication platform \u2014 how long before operations are fully restored?', options:[
    {text:'Minutes \u2014 automated failover and tested recovery for all critical systems',score:4},
    {text:'Hours \u2014 documented recovery procedures with regular testing',score:3},
    {text:'Within a day \u2014 we could recover but it would require significant manual effort',score:2},
    {text:'Days \u2014 recovery would be reactive and unpredictable',score:1},
    {text:'I don\u2019t know \u2014 and that concerns me',score:0}
  ]},
  { id:'cs17', dim:'D5', type:'scenario', cxConditional:true, text:'Do you have real visibility into what\u2019s actually happening in your customer interactions \u2014 not just satisfaction scores, but the substance and quality of the conversations?', options:[
    {text:'Yes \u2014 AI-powered analytics give us insight into 100% of interactions',score:4},
    {text:'Good visibility \u2014 QA program reviews a meaningful sample with structured evaluation',score:3},
    {text:'Basic \u2014 we track metrics like handle time and CSAT but don\u2019t analyze conversation substance',score:2},
    {text:'Limited \u2014 we rely on customer complaints and anecdotal feedback',score:1},
    {text:'No \u2014 we don\u2019t have systematic visibility into interaction quality',score:0}
  ]},
  { id:'cs18', dim:'D6', type:'scenario', text:'Do you know which people in your organization are already using AI in creative, high-impact ways to solve business problems?', options:[
    {text:'Yes \u2014 we\u2019ve identified them and are building on their knowledge across the organization',score:4},
    {text:'We know who some of them are and are starting to leverage their expertise',score:3},
    {text:'A few have self-identified, but there\u2019s no systematic way to find them',score:2},
    {text:'I suspect they exist but I couldn\u2019t name them',score:1},
    {text:'No \u2014 we have no visibility into who\u2019s innovating with AI',score:0}
  ]}
];

const CS_TAG = { id:'cs-tag', text:'What is the single biggest thing standing between your organization and effective AI adoption?', options:[
  {text:'We don\u2019t know where to start \u2014 too many options, no clear roadmap',tag:'Strategy'},
  {text:'Budget and ROI uncertainty \u2014 we can\u2019t justify the investment yet',tag:'ROI'},
  {text:'Our data isn\u2019t ready \u2014 too scattered, too messy, or too siloed',tag:'Data'},
  {text:'Security and compliance concerns \u2014 we\u2019re not sure how to use AI safely',tag:'Security'},
  {text:'Our people aren\u2019t ready \u2014 resistance, skills gaps, or cultural inertia',tag:'Culture'},
  {text:'We\u2019ve started but can\u2019t tell if what we\u2019re doing is working',tag:'Measurement'}
]};

const CS_DIM_MAP = { D1:['cs3','cs8','cs14'], D2:['cs2','cs11','cs15'], D3:['cs5','cs9','cs16'], D4:['cs1','cs7','cs13'], D5:['cs6','cs12','cs17'], D6:['cs4','cs10','cs18'] };

// ============================================================
// IT QUESTIONS (grouped by dimension)
// ============================================================
const IT_QUESTIONS = {
  D1: [
    { id:'it1', dim:'D1', type:'scenario', text:'Is AI currently being deployed in your organization, and if so, what is it being used for?', options:[
      {text:'No \u2014 AI hasn\u2019t moved beyond informal discussion',score:0},
      {text:'We\u2019re exploring or piloting AI in one or two areas, but nothing is in production',score:1},
      {text:'AI is deployed in specific use cases with measurable results in at least one department',score:2},
      {text:'Multiple active use cases across departments, tied to a documented strategy with executive ownership',score:3},

  D1:{ Foundational:'AI is on the radar but there\u2019s no roadmap, no ownership, and no way to measure whether it\u2019s working. That means every AI investment your organization makes is essentially unmanaged. Tools get purchased, pilots get launched, and nobody is accountable for whether any of it connects to a business outcome.', Developing:'There\u2019s strategic intent and maybe some executive interest, but AI initiatives are still running without clear ownership or measurable KPIs. That gap between interest and accountability is where most AI spending gets lost. The intent is there. The structure to act on it isn\u2019t.', Advancing:'Your organization has executive sponsorship and a direction, and AI investments are starting to tie to business outcomes. The remaining gap is between having a strategy and having the cross-functional alignment to execute it consistently. The vision is there but the coordination is not.', Leading:'AI strategy is owned at the executive level, funded with clear KPIs, and connected to measurable business outcomes. Your organization is in a strong position to scale what\u2019s working and expand into adjacent use cases with confidence.' },

  D4:{ Foundational:'There is no formal governance framework for AI use in your organization. That means employees are likely using AI tools without oversight, data is flowing to third-party models without controls, and there\u2019s no documentation trail if a regulator comes asking. With AI governance legislation already taking effect across multiple jurisdictions, this is the dimension with the most time-sensitive exposure.', Developing:'Some awareness of AI governance exists, but formal policies, oversight structures, and documentation are incomplete. Shadow AI is probably present and untracked. You know governance matters, but the gap between knowing and having enforceable policies in place is where regulatory and security risk accumulates.', Advancing:'Governance policies are in place and leadership takes AI oversight seriously. The remaining work is around enforcement consistency, documentation depth, or extending governance to cover newer AI use cases as they emerge. The framework exists. The question is whether it\u2019s keeping pace with how fast AI adoption is moving.', Leading:'AI governance is formalized, documented, and actively enforced. Your organization has visibility into what AI tools are in use, how data flows through them, and who is accountable. This is the posture regulators are looking for and most organizations haven\u2019t built yet.' },

// ============================================================
// SCORING
// ============================================================
function getDimScore(dimId) {
  const map = state.track === 'csuite' ? CS_DIM_MAP : IT_DIM_MAP;
  const qIds = map[dimId];
  let sum = 0, count = 0;
  qIds.forEach(id => {
    const a = state.answers[id];
    if (a !== undefined && a >= 0) { sum += a; count++; }
  });
  if (count === 0) return 0;
  return Math.round((sum / (count * 4)) * 100);
}

function getOverallScore() {
  const dims = ['D1','D2','D3','D4','D5','D6'];
  let total = 0, count = 0;
  dims.forEach(d => {
    if (d === 'D5' && state.cxSkipped) return;
    total += getDimScore(d);
    count++;
  });
  return count > 0 ? Math.round(total / count) : 0;
}

function getTier(score) {
  if (score <= 25) return 'Foundational';
  if (score <= 50) return 'Developing';
  if (score <= 75) return 'Advancing';
  return 'Leading';
}

function getTierColor(tier) {
  return {Foundational:'#B85C4F',Developing:'#C4956A',Advancing:'#5B8A72',Leading:'#7A8B6F'}[tier] || '#AC9379';
}

function getITFeedbackLevel(dimId) {
  const map = IT_DIM_MAP;
  const qIds = map[dimId];
  let sum = 0, count = 0;
  qIds.forEach(id => {
    const a = state.answers[id];
    if (a !== undefined && a >= 0) { sum += a; count++; }
  });
  if (count === 0) return 'skipped';
  const avg = sum / count;
  if (avg >= 3) return 'strong';
  if (avg >= 2) return 'developing';
  if (avg >= 1) return 'early';
  return 'newTerritory';
}

function updateProgress() {
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  const current = state.screens[state.screenIndex];
  if (!current || current.type === 'results' || current.type === 'contact-gate') {
    bar.style.display = 'none';
    return;
  }
  bar.style.display = 'block';
  // Count total progressable screens (not results)
  const total = state.screens.length - 1; // minus results
  const pct = Math.min(100, Math.round((state.screenIndex / total) * 100));
  fill.style.width = pct + '%';
}

// ============================================================
// RENDER ENGINE
// ============================================================
const app = document.getElementById('app');
let navDirection = 'forward'; // track direction for animation
let isTransitioning = false;

function showScreen(index, direction) {
  if (isTransitioning) return;
  const prevIndex = state.screenIndex;
  if (direction) navDirection = direction;
  else navDirection = index >= prevIndex ? 'forward' : 'back';

  state.screenIndex = index;
  updateProgress();

  if (index < 0) {
    return;
  }

  const screen = state.screens[index];
  if (!screen) return;

  // Skip CX conditional questions if CX was skipped
  if (screen.type === 'question' && screen.q.cxConditional && state.cxSkipped) {
    showScreen(index + (navDirection === 'forward' ? 1 : -1), navDirection);
    return;
  }
  // Skip CX tag if CX skipped
  if (screen.type === 'tag' && screen.tag.cxConditional && state.cxSkipped) {
    showScreen(index + (navDirection === 'forward' ? 1 : -1), navDirection);
    return;
  }

  // Animate transition
  const slideOut = navDirection === 'forward' ? 'slide-out-left' : 'slide-out-right';
  const slideIn = navDirection === 'forward' ? 'slide-in-right' : 'slide-in-left';

  if (prevIndex !== index && app.innerHTML.trim()) {
    isTransitioning = true;
    app.classList.add(slideOut);
    setTimeout(() => {
      app.classList.remove(slideOut);
      renderScreen(screen);
      app.classList.add(slideIn);
      window.scrollTo(0, 0);
      setTimeout(() => { app.classList.remove(slideIn); isTransitioning = false; }, 350);
    }, 200);
  } else {
    renderScreen(screen);
    window.scrollTo(0, 0);
  }
}

function renderScreen(screen) {
  switch(screen.type) {
    case 'profile-radio': renderProfileRadio(screen); break;
    case 'profile-platforms': renderProfilePlatforms(); break;
    case 'profile-checkbox': renderProfileCheckbox(screen); break;
    case 'question': renderQuestion(screen); break;
    case 'tag': renderTag(screen); break;
    case 'section-intro': renderSectionIntro(screen); break;
    case 'section-feedback': renderSectionFeedback(screen); break;
    case 'open-text': renderOpenText(screen); break;
    case 'contact-gate': renderContactGate(); break;
    case 'results': renderResults(); break;
  }
}

function shareAssessment() {
  const url = window.location.href;
  const subject = encodeURIComponent('AI Readiness Assessment');
  const body = encodeURIComponent('I just completed the AI Resulting readiness assessment. Take the ' + (state.track==='csuite'?'Technical':'Strategic') + ' version so we can see the full picture together.\n\n' + url);
  window.open('mailto:?subject=' + subject + '&body=' + body);
}

function emailResults() {
  const overall = getOverallScore();
  const tier = getTier(overall);
  const subject = encodeURIComponent('Your AI Readiness Results - ' + tier + ' (' + overall + '%)');
  const body = encodeURIComponent('Your AI Readiness Assessment Results\n\nOverall: ' + tier + ' (' + overall + '%)\n\nView your full results and radar chart at: ' + window.location.href);
  window.open('mailto:' + state.contact.email + '?subject=' + subject + '&body=' + body);
}

// ============================================================
// NAVIGATION
// ============================================================
function goNext() {
  showScreen(state.screenIndex + 1, 'forward');
}

function goBack() {
  if (state.screenIndex > 0) {
    // Skip back over CX-skipped screens
    let prev = state.screenIndex - 1;
    while (prev >= 0) {
      const s = state.screens[prev];
      if (s.type === 'question' && s.q.cxConditional && state.cxSkipped) { prev--; continue; }
      if (s.type === 'tag' && s.tag && s.tag.cxConditional && state.cxSkipped) { prev--; continue; }
      break;
    }
    showScreen(Math.max(0, prev), 'back');
  } else {
    showRoles();
  }
}

function selectPathway(pathway, el) {
  state.pathway = pathway;
  state.track = pathway === 'strategic' ? 'csuite' : 'it';
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  setTimeout(() => showRoles(), 400);
}

function showRoles() {
  // Filter roles based on pathway choice
  const filteredRoles = ROLES.filter(r => {
    if (state.pathway === 'strategic') return r.track === 'csuite' || r.track === 'followup';
    return r.track === 'it' || r.track === 'followup';
  });
  app.innerHTML = `
    <div class="screen active"><div class="screen-inner" style="text-align:center;">
      <div class="logo" style="justify-content:center;margin-bottom:40px;">
        <span class="logo-mark">AI</span><span class="logo-r">R</span><span class="logo-name">esulting</span>
      </div>
      <h1 class="screen-title" style="font-size:clamp(20px,3.5vw,28px);">Which role best describes you?</h1>
      <p class="screen-sub">This helps us tailor the questions and your results.</p>
      <div style="text-align:left;max-width:480px;margin:0 auto;">
        ${filteredRoles.map(r => `<button class="option-btn" onclick="selectRole('${r.text.replace(/'/g,"\\'")}',this)">${r.text}</button>`).join('')}
      </div>
      <div style="margin-top:32px;">
        <a class="back-link" onclick="showWelcome()">Back</a>
      </div>
    </div></div>`;
}

function selectRole(roleText, el) {
  state.role = ROLES.find(r => r.text === roleText);
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  setTimeout(() => showIntro(), 400);
}

function renderContactGate() {
  app.innerHTML = `
    <div class="screen active"><div class="screen-inner">
      <h2 class="screen-title">Your results are ready.</h2>
      <p class="screen-sub">Enter your details to see your full AI Readiness Report.</p>
      <div class="form-group">

      <div class="form-group">
        <label>Work Email</label>
        <input class="form-input" type="email" id="contactEmail" value="${state.contact.email}" placeholder="you@company.com" oninput="state.contact.email=this.value;validateContact()" onblur="validateContact()">
        <div class="form-error" id="emailError">Please use your work email address.</div>
      </div>
      <div class="form-group">
        <label>Company Name</label>
        <input class="form-input" type="text" id="contactCompany" value="${state.contact.company}" placeholder="Your company" oninput="state.contact.company=this.value;validateContact()">
      </div>
      <div class="btn-row">

        <button class="btn-primary" id="contactNext" disabled onclick="goNext()">See My Results</button>

}

const PERSONAL_DOMAINS = ['gmail.com','yahoo.com','yahoo.co.uk','hotmail.com','hotmail.co.uk','outlook.com','live.com','msn.com','aol.com','icloud.com','me.com','mac.com','protonmail.com','proton.me','mail.com','zoho.com','yandex.com','gmx.com','gmx.net','inbox.com','fastmail.com','hushmail.com','tutanota.com','guerrillamail.com','mailinator.com','comcast.net','verizon.net','att.net','sbcglobal.net','cox.net','charter.net','earthlink.net','optonline.net','frontier.com','windstream.net'];

function validateContact() {
  const btn = document.getElementById('contactNext');
  const errEl = document.getElementById('emailError');
  const emailInput = document.getElementById('contactEmail');
  if (!btn) return;

  const email = state.contact.email.trim().toLowerCase();
  const domain = email.split('@')[1] || '';
  const isPersonal = PERSONAL_DOMAINS.includes(domain);
  const hasValidFormat = email.includes('@') && domain.includes('.');

  if (errEl) {
    if (email && hasValidFormat && isPersonal) {
      errEl.style.display = 'block';
      if (emailInput) emailInput.classList.add('invalid');
    } else {
      errEl.style.display = 'none';
      if (emailInput) emailInput.classList.remove('invalid');
    }
  }

  const valid = state.contact.name.trim() && email && hasValidFormat && !isPersonal && state.contact.company.trim();
  btn.disabled = !valid;
}

function showIntro() {
  buildScreens();
  const introText = state.track === 'csuite'
    ? 'This isn\u2019t a test. There are no wrong answers. We\u2019re going to ask you a few questions about how your organization thinks about AI \u2014 where the opportunity is, where the exposure might be, and what the companies ahead of you are doing differently. It takes about 10 minutes. The results are yours immediately.'
    : 'This assessment maps your organization\u2019s technical environment across six dimensions of AI readiness. The questions are specific. The results are honest. It takes about 12 minutes, and your results are available immediately.';
  app.innerHTML = `
    <div class="screen active"><div class="screen-inner" style="text-align:center;">
      <div class="logo" style="justify-content:center;margin-bottom:40px;">
        <span class="logo-mark">AI</span><span class="logo-r">R</span><span class="logo-name">esulting</span>
      </div>
      <p style="font-size:16px;color:var(--gray);line-height:1.8;max-width:560px;margin:0 auto 32px;">${introText}</p>
      <div style="margin-top:16px;">
        <a class="back-link" onclick="showRoles()" style="margin-right:24px;">Back</a>
        <button class="btn-primary" onclick="showScreen(0)">Let\u2019s Go</button>
      </div>
    </div></div>`;
}
