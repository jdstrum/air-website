<title>AI Readiness Assessment | AI Resulting</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FDFBF9; --ink: #2F2F2F; --gold: #AC9379; --teal: #5B8A72;
  --pounamu: #7A8B6F; --amber: #C4956A; --clay: #B85C4F; --mist: #E8E2DC;
  --gray: #8A8279; --gray-light: #B5AFA8; --white: #FFFFFF;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--ink); font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased; }
h1,h2,h3 { font-family:'Trebuchet MS',sans-serif; }

/* Progress Bar */
#progressBar { position:fixed; top:0; left:0; right:0; height:5px; background:var(--mist); z-index:1000; display:none; }
#progressFill { height:100%; background:var(--gold); transition:width 0.5s cubic-bezier(0.4,0,0.2,1); width:0%; }
#progressPct { position:absolute; right:12px; top:10px; font-size:11px; font-weight:600; color:var(--gray); letter-spacing:0.03em; }

/* Layout & Transitions */
#screenWrap { position:relative; overflow:hidden; }
.screen { min-height:100vh; padding:60px 24px 80px; }
.screen-inner { max-width:700px; margin:0 auto; }
#app.slide-in-right { animation: slideInRight 0.35s cubic-bezier(0.4,0,0.2,1) forwards; }
#app.slide-in-left { animation: slideInLeft 0.35s cubic-bezier(0.4,0,0.2,1) forwards; }
#app.slide-out-left { animation: slideOutLeft 0.35s cubic-bezier(0.4,0,0.2,1) forwards; }
#app.slide-out-right { animation: slideOutRight 0.35s cubic-bezier(0.4,0,0.2,1) forwards; }
@keyframes slideInRight { from { transform:translateX(60px); opacity:0; } to { transform:translateX(0); opacity:1; } }
@keyframes slideOutLeft { from { transform:translateX(0); opacity:1; } to { transform:translateX(-60px); opacity:0; } }
@keyframes slideInLeft { from { transform:translateX(-60px); opacity:0; } to { transform:translateX(0); opacity:1; } }
@keyframes slideOutRight { from { transform:translateX(0); opacity:1; } to { transform:translateX(60px); opacity:0; } }

/* Logo */
.logo { display:inline-flex; align-items:center; margin-bottom:32px; }
.logo-mark { background:var(--ink); color:var(--gold); font-size:10px; font-weight:700; padding:5px 7px; border-radius:5px; letter-spacing:0.08em; margin-right:4px; }
.logo-r { font-family:'Trebuchet MS',sans-serif; font-size:18px; font-weight:700; color:var(--gold); }
.logo-name { font-family:'Trebuchet MS',sans-serif; font-size:18px; font-weight:600; color:var(--ink); }

/* Typography */
.screen-title { font-size:clamp(24px,4vw,36px); font-weight:700; color:var(--ink); margin-bottom:12px; letter-spacing:-0.02em; }
.screen-sub { font-size:15px; color:var(--gray); line-height:1.7; margin-bottom:32px; }
.q-number { font-size:12px; font-weight:600; color:var(--gray-light); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; }
.q-text { font-size:18px; font-weight:600; color:var(--ink); line-height:1.5; margin-bottom:28px; }

/* Options */
.option-btn { display:block; width:100%; text-align:left; background:var(--white); border:1.5px solid var(--mist); border-radius:8px; padding:16px 20px; margin-bottom:10px; font-family:'DM Sans',sans-serif; font-size:14px; line-height:1.5; color:var(--ink); cursor:pointer; transition:all 0.2s; }
.option-btn:hover { border-color:rgba(172,147,121,0.5); background:rgba(172,147,121,0.03); }
.option-btn.selected { border-color:var(--gold); background:rgba(172,147,121,0.08); font-weight:500; }

/* Likert */
.likert-row { display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.likert-btn { flex:1; min-width:100px; text-align:center; background:var(--white); border:1.5px solid var(--mist); border-radius:8px; padding:14px 8px; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--ink); cursor:pointer; transition:all 0.2s; }
.likert-btn:hover { border-color:rgba(172,147,121,0.5); }
.likert-btn.selected { border-color:var(--gold); background:rgba(172,147,121,0.08); font-weight:600; }

/* Checkboxes */
.checkbox-group { margin-bottom:24px; }
.checkbox-group h4 { font-size:13px; font-weight:600; color:var(--gray); margin-bottom:10px; text-transform:uppercase; letter-spacing:0.05em; }
.checkbox-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:8px; }
.chip { display:inline-block; padding:8px 16px; border:1.5px solid var(--mist); border-radius:20px; font-size:13px; color:var(--ink); cursor:pointer; transition:all 0.2s; user-select:none; }
.chip:hover { border-color:rgba(172,147,121,0.5); }
.chip.selected { border-color:var(--gold); background:rgba(172,147,121,0.08); font-weight:500; }

/* Buttons */
.btn-primary { display:inline-block; background:var(--gold); color:var(--white); border:none; border-radius:8px; padding:14px 36px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.btn-primary:hover { background:#967F67; }
.btn-primary:disabled { opacity:0.4; cursor:not-allowed; }
.btn-secondary { display:inline-block; background:transparent; color:var(--gold); border:1.5px solid var(--gold); border-radius:8px; padding:12px 28px; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; }
.btn-secondary:hover { background:rgba(172,147,121,0.06); }
.btn-row { display:flex; justify-content:space-between; align-items:center; margin-top:32px; }
.back-link { font-size:14px; color:var(--gray); cursor:pointer; text-decoration:none; transition:color 0.2s; }
.back-link:hover { color:var(--ink); }
.skip-link { font-size:13px; color:var(--gray-light); cursor:pointer; text-decoration:underline; margin-top:12px; display:inline-block; }

/* Text inputs */
.form-group { margin-bottom:20px; }
.form-group label { display:block; font-size:13px; font-weight:600; color:var(--gray); margin-bottom:6px; }
.form-input { width:100%; padding:12px 16px; border:1.5px solid var(--mist); border-radius:8px; font-family:'DM Sans',sans-serif; font-size:15px; color:var(--ink); background:var(--white); transition:border-color 0.2s; }
.form-input:focus { outline:none; border-color:var(--gold); }
textarea.form-input { min-height:100px; resize:vertical; }
.char-count { font-size:11px; color:var(--gray-light); text-align:right; margin-top:4px; }
.form-error { font-size:12px; color:var(--clay); margin-top:4px; display:none; }
.form-input.invalid { border-color:var(--clay); }

/* Horizontal bar chart (results) */
.dim-bar-wrap { margin-bottom:20px; }
.dim-bar-label { font-size:13px; font-weight:600; color:var(--ink); margin-bottom:6px; }
.dim-bar-track { height:28px; background:var(--mist); border-radius:6px; overflow:hidden; position:relative; }
.dim-bar-fill { height:100%; border-radius:6px; transition:width 1s cubic-bezier(0.4,0,0.2,1); display:flex; align-items:center; justify-content:flex-end; padding-right:10px; min-width:40px; }
.dim-bar-fill span { font-size:12px; font-weight:700; color:#fff; }
.dim-bar-tier { font-size:11px; font-weight:600; color:var(--gray); margin-top:3px; }

/* Section intro (IT track) */
.section-intro { text-align:center; padding:40px 0; }
.section-intro .dim-label { font-size:11px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:0.12em; margin-bottom:12px; }
.section-intro h2 { font-size:24px; margin-bottom:16px; }
.section-intro p { font-size:15px; color:var(--gray); line-height:1.7; max-width:560px; margin:0 auto; }

/* Section feedback (IT track) */
.section-feedback { padding:32px; background:rgba(172,147,121,0.04); border-radius:12px; border:1px solid var(--mist); margin:20px 0; }
.section-feedback .feedback-label { font-size:12px; font-weight:700; color:var(--gold); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; }
.section-feedback .feedback-level { font-size:18px; font-weight:700; color:var(--ink); margin-bottom:12px; }
.section-feedback p { font-size:14px; color:var(--gray); line-height:1.7; }

/* Results page */
.results-header { background:var(--ink); padding:48px 24px; text-align:center; }
.results-header .logo-mark { background:var(--bg); color:var(--gold); }
.results-header .logo-name { color:var(--bg); }
.results-header h1 { color:var(--bg); font-size:clamp(24px,3.5vw,36px); margin:24px 0 8px; }
.results-header .respondent { font-size:15px; color:var(--gray-light); }
.results-body { max-width:800px; margin:0 auto; padding:0 24px 80px; }
.tier-display { text-align:center; padding:0 0 40px; border-bottom:1px solid var(--mist); }
.tier-label { display:inline-block; padding:8px 24px; border-radius:6px; font-family:'Trebuchet MS',sans-serif; font-size:14px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; margin-bottom:8px; }
.tier-score { font-size:48px; font-weight:700; font-family:'Trebuchet MS',sans-serif; margin-bottom:4px; }
.tier-interp { font-size:15px; color:var(--gray); line-height:1.7; max-width:640px; margin:24px auto 0; text-align:left; }
.phase-badge { display:inline-block; padding:6px 16px; border-radius:6px; font-family:'Trebuchet MS',sans-serif; font-size:13px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; background:rgba(172,147,121,0.12); color:var(--gold); margin-bottom:12px; }
.phase-desc { font-size:14px; color:var(--gray); line-height:1.6; margin-bottom:16px; }
.skip-diagnosis { padding:32px; background:rgba(172,147,121,0.04); border-radius:12px; border:1px solid var(--mist); margin:32px 0; }
.skip-diagnosis h3 { font-size:16px; font-weight:700; margin-bottom:12px; color:var(--ink); }
.skip-diagnosis p { font-size:14px; color:var(--gray); line-height:1.7; }
.dim-section { padding:32px 0; border-bottom:1px solid var(--mist); }
.dim-section h3 { font-size:16px; font-weight:700; margin-bottom:6px; }
.dim-score-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
.dim-score-pct { font-size:24px; font-weight:700; font-family:'Trebuchet MS',sans-serif; }
.dim-tier-badge { font-size:11px; font-weight:700; padding:4px 12px; border-radius:4px; text-transform:uppercase; letter-spacing:0.06em; }
.dim-interp { font-size:14px; color:var(--gray); line-height:1.7; }
.callout-box { background:rgba(172,147,121,0.06); border-left:3px solid var(--gold); padding:20px 24px; border-radius:0 8px 8px 0; margin:32px 0; }
.callout-box h3 { font-size:15px; margin-bottom:8px; }
.callout-box p { font-size:14px; color:var(--gray); line-height:1.7; }
.cta-section { text-align:center; padding:48px 0; }
.cta-section .cta-personal { font-size:15px; color:var(--gray); margin-bottom:16px; font-style:italic; }
.cta-section .cta-framing { font-size:17px; font-weight:600; color:var(--ink); margin-bottom:16px; }
.cta-section .cta-body { font-size:14px; color:var(--gray); line-height:1.7; max-width:600px; margin:0 auto 28px; text-align:left; }
.cross-track { text-align:center; padding:32px 0; border-top:1px solid var(--mist); }
.cross-track p { font-size:14px; color:var(--gray); line-height:1.6; margin-bottom:16px; max-width:520px; margin-left:auto; margin-right:auto; }
.action-row { display:flex; gap:12px; justify-content:center; padding:24px 0; }
.results-footer { text-align:center; padding:40px 24px; border-top:1px solid var(--mist); }
.results-footer p { font-size:11px; color:var(--gray-light); }

/* Responsive */
@media(max-width:600px) {
  .screen { padding:40px 16px 60px; }
  .likert-row { flex-direction:column; }
  .likert-btn { min-width:auto; }
  .btn-row { flex-direction:column-reverse; gap:16px; align-items:stretch; text-align:center; }
  .action-row { flex-direction:column; align-items:center; }
}

/* Print */
@media print {
  #progressBar,.btn-primary,.btn-secondary,.back-link,.skip-link,.action-row,.cross-track,.btn-row,.cta-section { display:none!important; }
  .screen { padding:20px; }
  .results-header { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .dim-bar-fill { -webkit-print-color-adjust:exact; print-color-adjust:exact; transition:none!important; }
  .dim-bar-track { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .tier-label,.dim-tier-badge,.phase-badge { -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .results-body { padding:0 20px 40px; }
}
</style>
</head>
<body>

<div id="progressBar"><div id="progressFill"></div><span id="progressPct"></span></div>

<div id="screenWrap"><div id="app"></div></div>

<script>
// ============================================================
// STATE
// ============================================================
const state = {
  track: null,       // 'strategic' or 'technical'
  contact: { firstName:'', lastName:'', email:'', company:'', title:'' },
  profile: { industry:null, size:null, revenue:null, platforms:[], aiTools:[] },
  answers: {},
  tags: {},
  openText: { ot1:'' },
  urgency: [],
  cxSkipped: false,
  screenIndex: 0,
  screens: [],
  preScreens: []     // track pre-assessment screens for back navigation
};

// ============================================================
// DIMENSION NAMES (v2)
// ============================================================
const DIM_NAMES = {
  D1:'Strategic Vision & Leadership',
  D2:'Data & Infrastructure',
  D3:'Governance & Security',
  D4:'AI Spend & ROI',
  D5:'Experience Layer',
  D6:'Workforce & Adoption'
};

// ============================================================
// STRATEGIC TRACK QUESTIONS (S1-S18)
// ============================================================
const STRATEGIC_QUESTIONS = [
  // D1 — Strategic Vision & Leadership
  { id:'s1', dim:'D1', type:'likert', text:'Our organization has a documented AI strategy with clear ownership, defined milestones, and measurable business outcomes.' },
  { id:'s2', dim:'D1', type:'scenario', text:'Who in your organization is accountable for AI outcomes \u2014 not exploration, but measurable results?', options:[
    {text:'A dedicated AI leader or team with cross-functional authority and budget',score:4},
    {text:'A specific executive with defined goals',score:3},
    {text:'IT handles it as part of their general responsibilities',score:2},
    {text:'Someone has been informally tasked with figuring it out',score:1},
    {text:'Nobody \u2014 it hasn\u2019t been formally assigned',score:0}
  ]},
  { id:'s3', dim:'D1', type:'likert', text:'If asked today, I could clearly articulate the business outcomes our AI investments have produced.' },

  // D2 — Data & Infrastructure
  { id:'s4', dim:'D2', type:'scenario', text:'If you needed to pull a cross-functional dataset \u2014 combining sales, operations, finance, and customer data \u2014 how long would it take?', options:[
    {text:'Hours \u2014 our data is accessible and integrated across the business',score:4},
    {text:'A day or two \u2014 most of it is reachable but some assembly required',score:3},
    {text:'A week or more \u2014 it requires pulling from multiple systems and people',score:2},
    {text:'It would be a significant project \u2014 our data lives in silos',score:1},
    {text:'I\u2019m not sure we could do it with current systems',score:0}
  ]},
  { id:'s5', dim:'D2', type:'likert', text:'When different teams report on the same metric \u2014 revenue, customer count, pipeline \u2014 they get the same number.' },
  { id:'s6', dim:'D2', type:'likert', text:'I\u2019m confident our network and cloud environment could handle a significant increase in AI workload without major upgrades.' },

  // D3 — Governance & Security
  { id:'s7', dim:'D3', type:'scenario', text:'How much visibility do you have into which AI tools your employees are actually using and what company data is flowing through them?', options:[
    {text:'Full visibility \u2014 we know who\u2019s using what, with what data, on approved platforms',score:4},
    {text:'Good visibility \u2014 we\u2019ve deployed approved tools and track usage',score:3},
    {text:'Partial \u2014 we know some of it but couldn\u2019t give the full picture',score:2},
    {text:'Minimal \u2014 I know it\u2019s happening but couldn\u2019t tell you the specifics',score:1},
    {text:'None \u2014 and I\u2019m not sure I\u2019d know where to look',score:0}
  ]},
  { id:'s8', dim:'D3', type:'likert', text:'Our organization has a written, documented policy governing how employees can and cannot use AI tools.' },
  { id:'s9', dim:'D3', type:'likert', text:'The intelligence our people generate through AI \u2014 prompts, workflows, problem-solving approaches \u2014 is being captured and retained by the organization.' },

  // D4 — AI Spend & ROI
  { id:'s10', dim:'D4', type:'scenario', text:'For the AI tools your organization has purchased \u2014 Copilot, Einstein, Now Assist, Zoom AI, or others \u2014 what percentage of licensed users actively use them on a regular basis?', options:[
    {text:'75%+ \u2014 strong adoption across licensed users',score:4},
    {text:'50\u201375% \u2014 more than half are active but there\u2019s a gap',score:3},
    {text:'25\u201350% \u2014 we\u2019re paying for more than we\u2019re using',score:2},
    {text:'Under 25% \u2014 most licenses sit unused',score:1},
    {text:'I don\u2019t know \u2014 we haven\u2019t measured adoption against purchased seats',score:0}
  ]},
  { id:'s11', dim:'D4', type:'likert', text:'I could identify every AI-related line item on our P&L and tell you which ones are producing measurable value.' },
  { id:'s12', dim:'D4', type:'likert', text:'Our organization has reallocated or eliminated AI spending that wasn\u2019t producing results.' },

  // D5 — Experience Layer
  { id:'s13', dim:'D5', type:'scenario', cxGate:true, text:'How does your organization primarily interact with customers?', options:[
    {text:'Advanced CX operation \u2014 AI-assisted routing, real-time analytics, omnichannel',score:4},
    {text:'Integrated contact center with quality tools and workforce management',score:3},
    {text:'Multi-channel support (phone, email, chat) with some automation',score:2},
    {text:'Basic phone and email support with manual processes',score:1},
    {text:'We don\u2019t operate customer-facing support operations',score:-1,skip:true}
  ]},
  { id:'s14', dim:'D5', type:'likert', text:'The intelligence generated in our meetings, strategy sessions, and team conversations is captured and accessible afterward \u2014 not trapped in the heads of whoever attended.' },
  { id:'s15', dim:'D5', type:'likert', cxConditional:true, text:'When a customer contacts us through one channel and follows up through another, they don\u2019t have to repeat their story.' },

  // D6 — Workforce & Adoption
  { id:'s16', dim:'D6', type:'likert', text:'Our leadership team isn\u2019t just endorsing AI \u2014 they\u2019re personally using it, visibly championing it, and modeling the behavior they\u2019re asking for.' },
  { id:'s17', dim:'D6', type:'scenario', text:'Do you know which people in your organization are already using AI in creative, high-impact ways?', options:[
    {text:'Yes \u2014 we\u2019ve identified them and are building on their expertise across the organization',score:4},
    {text:'We know who some of them are and are starting to leverage what they\u2019ve built',score:3},
    {text:'I suspect they exist but couldn\u2019t name them',score:2},
    {text:'No \u2014 we have no visibility into who\u2019s innovating with AI',score:1}
  ]},
  { id:'s18', dim:'D6', type:'likert', text:'When we roll out a new technology or AI tool, most of the organization engages with it within weeks \u2014 not months.' }
];

// Strategic dimension map
const STRATEGIC_DIM_MAP = {
  D1:['s1','s2','s3'], D2:['s4','s5','s6'], D3:['s7','s8','s9'],
  D4:['s10','s11','s12'], D5:['s13','s14','s15'], D6:['s16','s17','s18']
};

// Strategic presentation order (mixed dimensions for engagement)
const STRATEGIC_ORDER = ['s7','s5','s2','s18','s4','s13','s9','s3','s10','s16','s6','s15','s8','s1','s11','s14','s17','s12'];

// ============================================================
// TECHNICAL TRACK QUESTIONS (T1-T18)
// ============================================================
const TECHNICAL_QUESTIONS = {
  D1: [
    { id:'t1', dim:'D1', type:'scenario', text:'Who owns AI initiatives in your organization, and what does that ownership actually look like?', options:[
      {text:'C-level ownership with a steering committee, defined budget, and reporting structure',score:4},
      {text:'A dedicated AI leader or team with cross-functional visibility and budget',score:3},
      {text:'A specific leader has been designated, but scope and authority are still forming',score:2},
      {text:'IT handles it as part of general responsibilities',score:1},
      {text:'Nobody \u2014 there\u2019s no designated owner',score:0}
    ]},
    { id:'t2', dim:'D1', type:'likert', text:'Our AI initiatives are tied to a documented strategy with specific use cases, timelines, and measurable outcomes \u2014 not just general direction.' },
    { id:'t3', dim:'D1', type:'likert', text:'Leadership gives AI the same rigor they give other strategic investments \u2014 defined budget, progress reviews, and accountability for outcomes.' }
  ],
  D2: [
    { id:'t4', dim:'D2', type:'scenario', text:'If a new AI tool needed to pull data from three different core systems in your organization, how long would that integration take?', options:[
      {text:'Hours \u2014 we have APIs, middleware, and a data platform that handles this routinely',score:4},

function getContinuumPhase(scores) {
  const overall = getOverallScore();
  if (overall <= 30) return { phase:1, name:'Visibility', desc:'You don\u2019t yet know what\u2019s happening in your environment' };
  if (scores.D3 <= 40 || scores.D2 <= 40) return { phase:2, name:'Foundation', desc:'You can see the gaps but the layers aren\u2019t built yet' };
  const d5 = scores.D5 !== null ? scores.D5 : 100;
  if (d5 <= 40 || scores.D4 <= 40) return { phase:3, name:'Activation', desc:'Foundation is in place, deployment is underway' };
  if (overall >= 65) return { phase:4, name:'Compound', desc:'AI is producing returns and the intelligence is being captured' };
  return { phase:2, name:'Foundation', desc:'You can see the gaps but the layers aren\u2019t built yet' };
}

// ============================================================
function getDimScore(dimId) {
  const map = state.track === 'strategic' ? STRATEGIC_DIM_MAP : TECHNICAL_DIM_MAP;
  const qIds = map[dimId];
  let sum = 0, count = 0;
  qIds.forEach(id => {
    const a = state.answers[id];
    if (a !== undefined && a >= 0) { sum += a; count++; }
  });
  if (count === 0) return 0;
  return Math.round((sum / (count * 4)) * 100);
}

function getOverallScore() {
  const dims = ['D1','D2','D3','D4','D5','D6'];
  let total = 0, count = 0;
  dims.forEach(d => {
    if (d === 'D5' && state.cxSkipped) {
      // Score D5 on 2 questions only (s14/t14 always scored; s15/t15 skipped)
      const map = state.track === 'strategic' ? STRATEGIC_DIM_MAP : TECHNICAL_DIM_MAP;
      const nonCxId = map.D5[1]; // s14 or t14 (meeting intelligence, always shown)
      const a = state.answers[nonCxId];
      if (a !== undefined && a >= 0) { total += Math.round((a / 4) * 100); count++; }
      return;
    }
    total += getDimScore(d);
    count++;
  });
  return count > 0 ? Math.round(total / count) : 0;
}

function getDimScoreForResults(dimId) {
  if (dimId === 'D5' && state.cxSkipped) {
    // Only score on the one non-conditional, non-gate question
    const map = state.track === 'strategic' ? STRATEGIC_DIM_MAP : TECHNICAL_DIM_MAP;
    const nonCxId = map.D5[1]; // s14 or t14
    const a = state.answers[nonCxId];
    if (a !== undefined && a >= 0) return Math.round((a / 4) * 100);
    return 0;
  }
  return getDimScore(dimId);
}

function getTier(score) {
  if (score <= 25) return 'Foundational';
  if (score <= 50) return 'Developing';
  if (score <= 75) return 'Advancing';
  return 'Leading';
}

function getTierColor(tier) {
  return {Foundational:'#B85C4F',Developing:'#C4956A',Advancing:'#5B8A72',Leading:'#7A8B6F'}[tier] || '#AC9379';
}

function getITFeedbackLevel(dimId) {
  const map = TECHNICAL_DIM_MAP;
  const qIds = map[dimId];
  let sum = 0, count = 0;
  qIds.forEach(id => {
    const a = state.answers[id];
    if (a !== undefined && a >= 0) { sum += a; count++; }
  });
  if (count === 0) return 'skipped';
  const avg = sum / count;
  if (avg >= 3) return 'strong';
  if (avg >= 2) return 'developing';
  if (avg >= 1) return 'early';
  return 'newTerritory';
}

const app = document.getElementById('app');
let navDirection = 'forward';
let isTransitioning = false;

function showScreen(index, direction) {
  if (isTransitioning) return;
  const prevIndex = state.screenIndex;
  if (direction) navDirection = direction;
  else navDirection = index >= prevIndex ? 'forward' : 'back';

  state.screenIndex = index;
  updateProgress();

  if (index < 0) return;

  const screen = state.screens[index];
  if (!screen) return;

  // Skip CX conditional questions if CX was skipped
  if (screen.type === 'question' && screen.q.cxConditional && state.cxSkipped) {
    showScreen(index + (navDirection === 'forward' ? 1 : -1), navDirection);
    return;
  }

  // Animate transition
  const slideOut = navDirection === 'forward' ? 'slide-out-left' : 'slide-out-right';
  const slideIn = navDirection === 'forward' ? 'slide-in-right' : 'slide-in-left';

  if (prevIndex !== index && app.innerHTML.trim()) {
    isTransitioning = true;
    app.classList.add(slideOut);
    setTimeout(() => {
      app.classList.remove(slideOut);
      renderScreen(screen);
      app.classList.add(slideIn);
      window.scrollTo(0, 0);
      setTimeout(() => { app.classList.remove(slideIn); isTransitioning = false; }, 350);
    }, 200);
  } else {
    renderScreen(screen);
    window.scrollTo(0, 0);
  }
}

function renderScreen(screen) {
  switch(screen.type) {
    case 'profile-radio': renderProfileRadio(screen); break;
    case 'profile-platforms': renderProfilePlatforms(); break;
    case 'profile-checkbox': renderProfileCheckbox(screen); break;
    case 'question': renderQuestion(screen); break;
    case 'tag': renderTag(screen); break;
    case 'section-intro': renderSectionIntro(screen); break;
    case 'section-feedback': renderSectionFeedback(screen); break;
    case 'open-text': renderOpenText(screen); break;

}

  var tierColor = getTierColor(tier);
  var dims = ['D1','D2','D3','D4','D5','D6'];

  });

  // Build scores object for diagnosis
  var scoresObj = {};
  dimScores.forEach(function(d) { scoresObj[d.id] = d.score; });
  if (state.cxSkipped) scoresObj.D5 = getDimScoreForResults('D5');

  // Continuum Phase
  var phase = getContinuumPhase(scoresObj);

  // Skip Diagnosis
  var diagnosis = getSkipDiagnosis(scoresObj);

  // Find lowest dimension
  var lowest = null;
  var priorityOrder = ['D3','D2','D4','D5','D6','D1'];
  dimScores.forEach(function(d) {
    if (!lowest || d.score < lowest.score) lowest = d;
    else if (d.score === lowest.score) {
      if (priorityOrder.indexOf(d.id) < priorityOrder.indexOf(lowest.id)) lowest = d;
    }
  });

  var trackKey = state.track;
  var callouts = LOWEST_CALLOUT[trackKey];
  var ctaHeadline = CTA_HEADLINES[tier];
  var firstName = state.contact.firstName || '';

  // Dimensional HTML
  var dimHTML = '';
  dimScores.forEach(function(d) {
    var t = getTier(d.score);
    var tc = getTierColor(t);
    var interpKey = t;
    if (d.id === 'D5' && state.cxSkipped && t === 'Foundational') interpKey = 'FoundationalSkipped';
    var interp = DIM_INTERP[d.id][interpKey] || DIM_INTERP[d.id][t];
    dimHTML += '<div class="dim-section"><h3>' + d.name + '</h3>' +
      '<div class="dim-score-row"><span class="dim-score-pct" style="color:' + tc + '">' + d.score + '%</span>' +
      '<span class="dim-tier-badge" style="background:' + tc + '15;color:' + tc + '">' + t + '</span></div>' +
      '<p class="dim-interp">' + interp + '</p></div>';
  });

  // Bar chart HTML
  var barHTML = '';
  dimScores.forEach(function(d) {
    var t = getTier(d.score);
    var tc = getTierColor(t);
    barHTML += '<div class="dim-bar-wrap"><div class="dim-bar-label">' + d.name + '</div>' +
      '<div class="dim-bar-track"><div class="dim-bar-fill" data-width="' + d.score + '%" style="width:0;background:' + tc + ';"><span>' + d.score + '%</span></div></div>' +
      '<div class="dim-bar-tier" style="color:' + tc + '">' + t + '</div></div>';
  });

  // Cross-track text
  var crossTrackText = state.track === 'strategic'
    ? firstName + ', want the full picture? Share the Technical Assessment with your CIO or technology leader. When both perspectives are in, a Resultant has the complete diagnostic \u2014 what leadership sees and what the architecture shows.'
    : firstName + ', want the full picture? Share the Strategic Assessment with your CEO or business leader. When both perspectives are in, a Resultant has the complete diagnostic \u2014 what the business needs and what the environment can deliver.';

  app.innerHTML =
    '<div class="results-header">' +
    '<div class="logo" style="justify-content:center;">' +
    '<span class="logo-mark">AI</span><span class="logo-r">R</span><span class="logo-name" style="color:var(--bg)">esulting</span>' +
    '</div>' +
    '<h1>Your AI Readiness Results</h1>' +
    '<div class="respondent">' + state.contact.firstName + ' ' + state.contact.lastName + ', ' + state.contact.company + '</div>' +
    '</div>' +
    '<div class="results-body">' +

    // Bar chart
    '<div style="padding:40px 0 32px;">' + barHTML + '</div>' +

    // Overall score + Continuum Position
    '<div class="tier-display">' +
    '<div class="tier-score" style="color:' + tierColor + '">' + overall + '%</div>' +
    '<div class="tier-label" style="background:' + tierColor + '15;color:' + tierColor + '">' + tier + '</div>' +
    '<div style="margin-top:20px;"><span class="phase-badge">Phase ' + phase.phase + ': ' + phase.name + '</span></div>' +
    '<div class="phase-desc">' + firstName + ', your organization is at Phase ' + phase.phase + ' of the AI Readiness Continuum. ' + phase.desc + '.</div>' +
    '</div>' +

    // Skip Diagnosis
    '<div class="skip-diagnosis">' +
    (diagnosis.name ? '<h3>' + diagnosis.name + '</h3>' : '') +
    '<p>' + diagnosis.copy + '</p>' +
    '</div>' +

    // Dimensional breakdown
    dimHTML +

    // Lowest-dimension callout
    (lowest ? '<div class="callout-box"><h3>Your ' + lowest.name + ' score is your most significant opportunity area.</h3><p>' + callouts[lowest.id] + '</p></div>' : '') +

    // CTA Section
    '<div class="cta-section">' +
    '<div class="cta-personal">' + firstName + ', your results are ready. If you want to talk about what comes next, we\u2019re here.</div>' +
    '<div class="cta-framing">' + ctaHeadline + '</div>' +
    '<div class="cta-body">' + CTA_BODY + '</div>' +
    '<button class="btn-primary" onclick="window.open(\'mailto:info@airesulting.com?subject=Assessment%20Conversation%20Request&body=' + encodeURIComponent(firstName + ' ' + state.contact.lastName + ' from ' + state.contact.company + ' completed the ' + (state.track==='strategic'?'Strategic':'Technical') + ' AI Readiness Assessment (' + tier + ', ' + overall + '%).') + '\',\'_blank\')">Talk to a Resultant</button>' +
    '</div>' +

    // Cross-track prompt
    '<div class="cross-track">' +
    '<p>' + crossTrackText + '</p>' +
    '<button class="btn-secondary" onclick="shareAssessment()">Share the Assessment</button>' +
    '</div>' +

    // Action row
    '<div class="action-row">' +
    '<button class="btn-secondary" onclick="window.print()">Save as PDF</button>' +
    '<button class="btn-secondary" onclick="emailResults()">Email My Results</button>' +
    '</div>' +

    // Footer
    '<div class="results-footer">' +
    '<div class="logo" style="justify-content:center;margin-bottom:12px;">' +
    '<span class="logo-mark">AI</span><span class="logo-r">R</span><span class="logo-name">esulting</span>' +
    '</div>' +
    '<p>&copy; 2026 AI Resulting. All rights reserved.</p>' +
    '</div>' +
    '</div>';

  // Animate bars
  setTimeout(function() {
    document.querySelectorAll('.dim-bar-fill[data-width]').forEach(function(bar) {
      bar.style.width = bar.getAttribute('data-width');
    });
  }, 200);
}

function shareAssessment() {
  var url = window.location.href;
  var subject = encodeURIComponent('AI Readiness Assessment');
  var body = encodeURIComponent('I just completed the AI Resulting readiness assessment. Take the ' + (state.track==='strategic'?'Technical':'Strategic') + ' version so we can see the full picture together.\n\n' + url);
  window.open('mailto:?subject=' + subject + '&body=' + body);
}

function emailResults() {
  var overall = getOverallScore();
  var tier = getTier(overall);
  var subject = encodeURIComponent('Your AI Readiness Results - ' + tier + ' (' + overall + '%)');
  var body = encodeURIComponent('Your AI Readiness Assessment Results\n\nOverall: ' + tier + ' (' + overall + '%)\n\nView your full results at: ' + window.location.href);
  window.open('mailto:' + state.contact.email + '?subject=' + subject + '&body=' + body);
}

// ============================================================
// NAVIGATION
// ============================================================
function goNext() {
  showScreen(state.screenIndex + 1, 'forward');
}

function goBack() {
  if (state.screenIndex > 0) {
    var prev = state.screenIndex - 1;
    while (prev >= 0) {
      var s = state.screens[prev];
      if (s.type === 'question' && s.q.cxConditional && state.cxSkipped) { prev--; continue; }
      break;
    }
    showScreen(Math.max(0, prev), 'back');
  } else {
    // Go back to contact gate
    renderContactGate();
  }
}

// ============================================================
// PRE-ASSESSMENT SCREENS
// ============================================================
function showWelcome() {
  app.innerHTML =
    '<div class="screen active"><div class="screen-inner" style="text-align:center;">' +
    '<div class="logo" style="justify-content:center;margin-bottom:40px;">' +
    '<span class="logo-mark">AI</span><span class="logo-r">R</span><span class="logo-name">esulting</span>' +
    '</div>' +
    '<h1 class="screen-title">Know Where You Stand.</h1>' +
    '<p class="screen-sub" style="max-width:560px;margin:0 auto 24px;">Two assessments. One built for the boardroom, one built for the server room. Choose the lens that fits how you think about AI.</p>' +
    '<p style="font-size:13px;color:var(--gray);margin:0 auto 32px;letter-spacing:0.02em;">Takes about 10 minutes.</p>' +
    '<div style="display:flex;gap:16px;max-width:600px;margin:0 auto;flex-wrap:wrap;">' +
    '<button class="option-btn" style="flex:1;min-width:260px;padding:28px 24px;text-align:center;" onclick="selectPathway(\'strategic\',this)">' +
    '<strong style="display:block;margin-bottom:10px;font-size:18px;font-family:\'Trebuchet MS\',sans-serif;">Strategic Assessment</strong>' +
    '<span style="font-size:14px;color:var(--gray);line-height:1.6;">How AI connects to business outcomes, investment priorities, and organizational readiness.</span>' +
    '</button>' +
    '<button class="option-btn" style="flex:1;min-width:260px;padding:28px 24px;text-align:center;" onclick="selectPathway(\'technical\',this)">' +
    '<strong style="display:block;margin-bottom:10px;font-size:18px;font-family:\'Trebuchet MS\',sans-serif;">Technical Assessment</strong>' +
    '<span style="font-size:14px;color:var(--gray);line-height:1.6;">How your infrastructure, data environment, and security posture support AI workloads.</span>' +
    '</button>' +
    '</div></div></div>';
}

function selectPathway(pathway, el) {
  state.track = pathway;
  document.querySelectorAll('.option-btn').forEach(function(b) { b.classList.remove('selected'); });
  el.classList.add('selected');
  setTimeout(function() { renderContactGate(); }, 400);
}

function renderContactGate() {
  app.innerHTML =
    '<div class="screen active"><div class="screen-inner">' +
    '<div class="logo" style="margin-bottom:40px;">' +
    '<span class="logo-mark">AI</span><span class="logo-r">R</span><span class="logo-name">esulting</span>' +
    '</div>' +
    '<h2 class="screen-title">Before we begin.</h2>' +
    '<p class="screen-sub">So we can build your personalized readiness report.</p>' +
    '<div style="display:flex;gap:16px;">' +
    '<div class="form-group" style="flex:1;">' +
    '<label>First Name</label>' +
    '<input class="form-input" type="text" id="contactFirstName" value="' + state.contact.firstName + '" placeholder="First name" oninput="state.contact.firstName=this.value;validateContact()">' +
    '</div>' +
    '<div class="form-group" style="flex:1;">' +
    '<label>Last Name</label>' +
    '<input class="form-input" type="text" id="contactLastName" value="' + state.contact.lastName + '" placeholder="Last name" oninput="state.contact.lastName=this.value;validateContact()">' +
    '</div></div>' +
    '<div class="form-group">' +
    '<label>Work Email</label>' +
    '<input class="form-input" type="email" id="contactEmail" value="' + state.contact.email + '" placeholder="you@company.com" oninput="state.contact.email=this.value;validateContact()" onblur="validateContact()">' +
    '<div class="form-error" id="emailError">Please use your work email address.</div>' +
    '</div>' +
    '<div style="display:flex;gap:16px;">' +
    '<div class="form-group" style="flex:1;">' +
    '<label>Company Name</label>' +
    '<input class="form-input" type="text" id="contactCompany" value="' + state.contact.company + '" placeholder="Your company" oninput="state.contact.company=this.value;validateContact()">' +
    '</div>' +
    '<div class="form-group" style="flex:1;">' +
    '<label>Title</label>' +
    '<input class="form-input" type="text" id="contactTitle" value="' + state.contact.title + '" placeholder="Your title" oninput="state.contact.title=this.value;validateContact()">' +
    '</div></div>' +
    '<div class="btn-row">' +
    '<a class="back-link" onclick="showWelcome()">Back</a>' +
    '<button class="btn-primary" id="contactNext" disabled onclick="startAssessment()">Begin Assessment</button>' +
    '</div></div></div>';
  validateContact();
}

function validateContact() {
  var btn = document.getElementById('contactNext');
  var errEl = document.getElementById('emailError');
  var emailInput = document.getElementById('contactEmail');
  if (!btn) return;

  var email = state.contact.email.trim().toLowerCase();
  var domain = email.split('@')[1] || '';
  var isPersonal = PERSONAL_DOMAINS.includes(domain);
  var hasValidFormat = email.includes('@') && domain.includes('.');

  if (errEl) {
    if (email && hasValidFormat && isPersonal) {
      errEl.style.display = 'block';
      if (emailInput) emailInput.classList.add('invalid');
    } else {
      errEl.style.display = 'none';
      if (emailInput) emailInput.classList.remove('invalid');
    }
  }

  var valid = state.contact.firstName.trim() && state.contact.lastName.trim() && email && hasValidFormat && !isPersonal && state.contact.company.trim() && state.contact.title.trim();
  btn.disabled = !valid;
}

function startAssessment() {
  buildScreens();
  showScreen(0);
}

// ============================================================
// INIT
// ============================================================
showWelcome();
</script>
</body>
</html>
